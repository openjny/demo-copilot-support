name: Auto-merge knowledge PRs

# ナレッジ/調査記録の PR を以下のタイミングで自動マージする:
#   1. `approved` ラベルが付与されたとき（ユーザーが OK を出した合図）
#   2. Issue に `/approve` コメントが投稿されたとき（書き込み権限者のみ）
#   3. 毎日のスケジュール実行で、最終更新から STALE_DAYS 日以上経過し、
#      かつ knowledge/ または investigations/ のみを変更している PR
#
# マージ時に PR 本文の `Closes #<issue>` により対象 Issue が自動クローズされる。
#
# 注意:
# - ブランチ保護で必須レビュー/必須チェックを設定している場合、既定の
#   GITHUB_TOKEN ではマージできないことがある。その場合は保護ルールを調整するか
#   専用トークンを使用すること。

on:
  pull_request_target:
    types: [labeled]
  issue_comment:
    types: [created]
  schedule:
    - cron: "0 0 * * *" # 毎日 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ラベル付与（ユーザー OK）による即時マージ
  merge-on-approval:
    if: github.event_name == 'pull_request_target' && github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          echo "Merging approved PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --repo "$OWNER/$REPO" --squash --delete-branch

          # キーワードの推定に頼らず、紐付く Issue を明示的にクローズ
          for i in $(gh api graphql -f query='
            query($owner:String!, $repo:String!, $pr:Int!) {
              repository(owner:$owner, name:$repo) {
                pullRequest(number:$pr) {
                  closingIssuesReferences(first: 20) { nodes { number state } }
                }
              }
            }' -f owner="$OWNER" -f repo="$REPO" -F pr="$PR_NUMBER" \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[] | select(.state=="OPEN") | .number'); do
            echo "Closing linked issue #$i"
            gh issue close "$i" --repo "$OWNER/$REPO" \
              --comment "関連 PR #$PR_NUMBER のマージにより対応完了のためクローズします。" || true
          done

  # Issue への `/approve` コメントによるマージ（書き込み権限者のみ）
  merge-on-command:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/approve') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR linked to the issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          # Issue を Closes する（ひも付く）OPEN かつ非ドラフトの PR を取得
          pr_number=$(gh api graphql -f query='
            query($owner:String!, $repo:String!, $number:Int!) {
              repository(owner:$owner, name:$repo) {
                issue(number:$number) {
                  closedByPullRequestsReferences(first: 10, includeClosedPrs: false) {
                    nodes { number state isDraft }
                  }
                }
              }
            }' -f owner="$OWNER" -f repo="$REPO" -F number="$ISSUE_NUMBER" \
            --jq '[ .data.repository.issue.closedByPullRequestsReferences.nodes[]
                    | select(.state=="OPEN" and .isDraft==false) ][0].number // empty')

          if [ -z "$pr_number" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$OWNER/$REPO" \
              --body "⚠️ \`/approve\` を受け取りましたが、マージ可能な（ドラフトでない）関連 PR が見つかりませんでした。"
            exit 0
          fi

          echo "Merging PR #$pr_number for issue #$ISSUE_NUMBER"
          gh pr merge "$pr_number" --repo "$OWNER/$REPO" --squash --delete-branch

          # キーワード自動クローズに頼らず明示的にクローズ
          gh issue close "$ISSUE_NUMBER" --repo "$OWNER/$REPO" \
            --comment "✅ \`/approve\` により PR #$pr_number をマージし、本 Issue をクローズしました。" || true

  # 一定期間放置された PR の自動マージ
  merge-stale:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
      STALE_DAYS: "7"
    steps:
      - name: Merge stale knowledge PRs
        run: |
          set -euo pipefail
          cutoff=$(date -u -d "${STALE_DAYS} days ago" +%s)

          prs=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --limit 100 \
            --json number,updatedAt,isDraft,files)

          echo "$prs" | jq -c '.[]' | while read -r pr; do
            number=$(echo "$pr" | jq -r '.number')
            updated=$(echo "$pr" | jq -r '.updatedAt')
            is_draft=$(echo "$pr" | jq -r '.isDraft')
            updated_epoch=$(date -u -d "$updated" +%s)

            # knowledge/ または investigations/ 以外を変更している PR は対象外
            outside=$(echo "$pr" | jq -r '
              [ .files[].path
                | select((startswith("knowledge/") or startswith("investigations/")) | not)
              ] | length')

            if [ "$is_draft" = "true" ]; then
              echo "Skip #$number (draft)"
              continue
            fi
            if [ "$outside" -ne 0 ]; then
              echo "Skip #$number (touches files outside knowledge/ or investigations/)"
              continue
            fi
            if [ "$updated_epoch" -gt "$cutoff" ]; then
              echo "Skip #$number (updated $updated, not stale yet)"
              continue
            fi

            echo "Merging stale PR #$number (last updated $updated)"
            if gh pr merge "$number" \
              --repo "$OWNER/$REPO" \
              --squash --delete-branch; then
              # キーワードに頼らず紐付く Issue を明示的にクローズ
              for i in $(gh api graphql -f query='
                query($owner:String!, $repo:String!, $pr:Int!) {
                  repository(owner:$owner, name:$repo) {
                    pullRequest(number:$pr) {
                      closingIssuesReferences(first: 20) { nodes { number state } }
                    }
                  }
                }' -f owner="$OWNER" -f repo="$REPO" -F pr="$number" \
                --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[] | select(.state=="OPEN") | .number'); do
                echo "Closing linked issue #$i"
                gh issue close "$i" --repo "$OWNER/$REPO" \
                  --comment "関連 PR #$number の自動マージにより対応完了のためクローズします。" || true
              done
            else
              echo "Failed to merge #$number (branch protection or conflicts?)"
            fi
          done
